version: "1.0"

inboxroi-agent-env:
  services: []
  actor:
    channels:
      - type: http
        url: http://localhost:8008/classify
        method: POST
        request:
          message_field: message
        response:
          type: json
          message_field: response
    config:
      MAX_TURNS: "1"
  agent:
    name: InboxROI Agent
    code_path: /agent
    entry_point: uvicorn veris_api:app --host 0.0.0.0 --port 8008
    port: 8008
